name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p site-dist
          # copy site files
          cp -R site/* site-dist/
          # include root docs, data, art, and Unity folder
          cp -R GAME_DESIGN.md data art Unity site-dist/ || true

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site-dist
          publish_branch: gh-pages
